<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
  
  <style>
    :root {
      --bg: #f0f0ed;
      --surface: #ffffff;
      --border: #e2e2de;
      --text: #1a1a18;
      --muted: #7a7a74;
      --accent: #1a1a18;
      --accent-light: #f5f5f2;
      --danger: #c0392b;
      --warning: #d68910;
      --success: #1e8449;
      --info: #1a5276;
      --mp: #5b2c6f;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --nav-h: 60px;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      margin: 0;
      padding-bottom: 40px;
    }

    /* NAVBAR */
    .gda-nav {
      background: var(--accent);
      height: var(--nav-h);
      display: flex;
      align-items: center;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 16px;
    }
    .gda-nav .logo { height: 30px; }
    .gda-nav .nav-links { display: flex; gap: 4px; flex: 1; }
    .nav-btn {
      background: none; border: none; color: #888;
      padding: 6px 12px; border-radius: 6px; font-size: 0.82rem;
      cursor: pointer; display: flex; align-items: center;
      gap: 6px; transition: all 0.15s; white-space: nowrap;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: #ddd; }
    .nav-btn.active { background: rgba(255,255,255,0.12); color: #fff; }
    .user-chip {
      background: #2a2a2a; color: #ccc; padding: 5px 12px;
      border-radius: 20px; font-size: 0.78rem; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .logout-lnk {
      color: #666; font-size: 0.78rem; cursor: pointer;
      background: none; border: none; padding: 4px; transition: color 0.15s;
    }
    .logout-lnk:hover { color: #fff; }

    /* LOGIN */
    #loaderBase {
      position: fixed; inset: 0; background: #1a1a18;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
    }
    #loaderBase .spinner-border { color: #fff; width: 2rem; height: 2rem; }
    #loaderBase p { color: #888; margin-top: 16px; font-size: 0.9rem; }
    #loginScreen {
      position: fixed; inset: 0; background: #1a1a18;
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .login-card {
      background: #242422; border: 1px solid #333;
      border-radius: 16px; padding: 40px; width: 100%; max-width: 380px;
    }
    .login-card h5 { color: #eee; font-size: 1.1rem; font-weight: 600; }
    .login-card label { color: #999; font-size: 0.8rem; font-weight: 600; }
    .btn-google {
      background: #fff; color: #1a1a18; border: none;
      border-radius: 8px; font-weight: 700; padding: 12px;
      width: 100%; transition: opacity 0.15s; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { opacity: 0.88; }
    #loginError { display: none; margin-bottom: 16px; }
    #loginError.show { display: block; }

    /* LAYOUT */
    .main-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    /* TASK CARDS */
    .task-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 16px;
      transition: box-shadow 0.2s, border-color 0.2s; overflow: hidden;
    }
    .task-card:hover { box-shadow: var(--shadow); border-color: #ccc; }
    .task-card-head { padding: 14px 16px; }
    .task-card-body {
      display: none; padding: 16px;
      border-top: 1px solid var(--border); background: #fafaf8;
    }

    /* BADGES */
    .prio-badge {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.03em; padding: 2px 8px; border-radius: 4px;
    }
    .prio-urgent   { background: #fdecea; color: #c0392b; }
    .prio-important{ background: #fef9e7; color: #d68910; }
    .prio-low      { background: #eafaf1; color: #1e8449; }
    .prio-default  { background: #f2f2ef; color: #555; }

    .status-badge {
      font-size: 0.72rem; padding: 2px 8px;
      border-radius: 4px; font-weight: 600;
    }
    .s-todo     { background: #f2f2ef; color: #555; }
    .s-progress { background: #e8f4fd; color: #1a5276; }
    .s-review   { background: #fef9e7; color: #d68910; }
    .s-done     { background: #eafaf1; color: #1e8449; }
    .s-mp       { background: #f5eef8; color: #5b2c6f; }

    /* BUTTONS */
    .btn-dark-sm {
      background: var(--accent); color: #fff; border: none;
      border-radius: 6px; padding: 6px 14px; font-size: 0.8rem;
      cursor: pointer; transition: opacity 0.15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-dark-sm:hover { opacity: 0.82; }
    .btn-outline-sm {
      background: transparent; color: var(--accent);
      border: 1px solid #ccc; border-radius: 6px; padding: 6px 14px;
      font-size: 0.8rem; cursor: pointer; transition: background 0.15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-outline-sm:hover { background: var(--accent-light); }

    /* FILTERS */
    .filtros-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; margin-bottom: 20px;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    }
    .filtros-bar select, .filtros-bar input {
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; font-size: 0.82rem;
      background: var(--bg); color: var(--text); min-width: 130px;
    }
    .filtros-label {
      font-size: 0.78rem; color: var(--muted);
      font-weight: 600; white-space: nowrap;
    }

    /* SECTION */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 10px;
    }
    .section-header h3 { font-size: 1.2rem; font-weight: 700; color: var(--text); margin: 0; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; }

    /* TOAST */
    .gda-toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #1a1a18; color: #fff; padding: 12px 20px;
      border-radius: 8px; font-size: 0.85rem; z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transform: translateY(80px); opacity: 0; transition: all 0.3s; max-width: 320px;
    }
    .gda-toast.show { transform: translateY(0); opacity: 1; }
    .gda-toast.success { border-left: 4px solid #1e8449; }
    .gda-toast.error   { border-left: 4px solid #c0392b; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .gda-nav { padding: 0 12px; }
      .nav-btn span { display: none; }
      .main-wrap { padding: 16px 12px; }
      .login-card { margin: 16px; padding: 30px 24px; }
    }
  </style>
</head>
<body>

<div id="loaderBase" class="d-none">
  <img src="https://lh3.googleusercontent.com/d/1BdDUPadDk_U4Tqx8V7Td1JjlV43OMPs6" height="44" alt="GDA" style="margin-bottom:24px;opacity:0.9;">
  <div class="spinner-border"></div>
  <p>Cargando Portal...</p>
</div>

<div id="loginScreen">
  <div class="login-card">
    <div class="text-center mb-4">
      <img src="https://lh3.googleusercontent.com/d/1BdDUPadDk_U4Tqx8V7Td1JjlV43OMPs6" height="44" alt="GDA Logo" style="margin-bottom:16px;">
      <h5 class="mb-2">Ingreso al Portal GDA</h5>
      <p class="text-muted small">Usa tu cuenta de Google para continuar</p>
    </div>
    
    <div id="loginError" class="alert alert-danger small py-2 text-center" style="border-radius:8px;"></div>
    
    <button class="btn-google" onclick="loginConGoogle()" id="btnGoogle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="1"></circle>
      </svg>
      Entrar con Google
    </button>
  </div>
</div>

<div id="appContainer" class="d-none">
  <nav class="gda-nav">
    <img src="https://lh3.googleusercontent.com/d/1BdDUPadDk_U4Tqx8V7Td1JjlV43OMPs6" class="logo" alt="GDA">
    <div class="nav-links">
      <button class="nav-btn active" id="nav-activas" onclick="cambiarVista('activas')">
        <i class="bi bi-list-task"></i><span>Tareas</span>
      </button>
      <button class="nav-btn" id="nav-marketplace" onclick="cambiarVista('marketplace')">
        <i class="bi bi-shop"></i><span>Marketplace</span>
      </button>
      <button class="nav-btn" id="nav-historico" onclick="cambiarVista('historico')">
        <i class="bi bi-clock-history"></i><span>Histórico</span>
      </button>
      <button class="nav-btn" id="nav-dashboard" onclick="cambiarVista('dashboard')" style="display:none;">
        <i class="bi bi-bar-chart-line"></i><span>Dashboard</span>
      </button>
    </div>
    <div class="d-flex align-items-center gap-2">
      <div class="user-chip"><i class="bi bi-person-circle"></i><span class="uname" id="userName">...</span></div>
      <button class="logout-lnk" onclick="cerrarSesion()" title="Cerrar sesión"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </nav>

  <div class="main-wrap">
    <div id="vistaActivas">
      <div class="section-header">
        <h3 id="tituloTareas"><i class="bi bi-list-task"></i> Mis Tareas Activas</h3>
      </div>
      <div class="filtros-bar">
        <span class="filtros-label"><i class="bi bi-funnel"></i> Filtros:</span>
        <select id="filtroProyecto" onchange="aplicarFiltros()">
          <option value="">Todos los proyectos</option>
        </select>
        <select id="filtroStatus" onchange="aplicarFiltros()">
          <option value="">Todos los estados</option>
          <option value="To Do">To Do</option>
          <option value="In Progress">In Progress</option>
          <option value="En revisión">En revisión</option>
        </select>
        <button class="btn-outline-sm" onclick="limpiarFiltros()"><i class="bi bi-x"></i> Limpiar</button>
      </div>
      <div id="listaTareas" class="row g-3"></div>
    </div>

    <div id="vistaMarketplace" class="d-none">
      <div class="section-header">
        <h3><i class="bi bi-shop"></i> Marketplace</h3>
      </div>
      <div id="listaMP"></div>
    </div>

    <div id="vistaHistorico" class="d-none">
      <div class="section-header">
        <h3><i class="bi bi-check-all text-success"></i> Tareas Completadas</h3>
      </div>
      <div id="tablaHistorico"></div>
    </div>

    <div id="vistaDashboard" class="d-none">
      <div class="section-header">
        <h3><i class="bi bi-bar-chart-line-fill" style="color:var(--info)"></i> Rendimiento</h3>
      </div>
      <div id="dashboardContent"></div>
    </div>
  </div>
</div>

<div id="gdaToast" class="gda-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ═══════════════════════════════════════════════════
// FIREBASE CONFIG - REEMPLAZA CON TUS DATOS
// ═══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDeSGdwJ_7hPud-1svEP-x5cavrSrGOOJM",
  authDomain: "trackerweb-fe0ad.firebaseapp.com",
  projectId: "trackerweb-fe0ad",
  storageBucket: "trackerweb-fe0ad.firebasestorage.app",
  messagingSenderId: "210227158679",  
  appId: "1:210227158679:web:24a280c1070485068453d2",
};

const firebase = window.firebase;
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ═══════════════════════════════════════════════════
// API URL - REEMPLAZA CON TU GAS
// ═══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbxpWIDF9EoGLndikGRWuemWscpX0Xrwi0IQ2y0ECNeNlgtBSzIqCQRtzgzeDwtJ5uTl/exec';

// ═══════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════
let state = {
  email: "",
  nombre: "",
  rol: "",
  esManager: false,
  tareasRaw: [],
  equipoCompleto: []
};

// ═══════════════════════════════════════════════════
// FIREBASE LOGIN
// ═══════════════════════════════════════════════════
function loginConGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  const btnGoogle = document.getElementById('btnGoogle');
  btnGoogle.disabled = true;
  btnGoogle.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verificando...';
  
  auth.signInWithPopup(provider)
    .then(result => {
      const emailUsuario = result.user.email;
      verificarEmailEnSheets(emailUsuario);
    })
    .catch(error => {
      mostrarError('Error de autenticación: ' + error.message);
      btnGoogle.disabled = false;
      btnGoogle.innerHTML = '<i class="bi bi-google me-1"></i> Entrar con Google';
    });
}

function verificarEmailEnSheets(emailUsuario) {
  callAPI('verificarEmail', { email: emailUsuario })
    .then(res => {
      if (res.autorizado) {
        iniciarSesion(res);
      } else {
        auth.signOut();
        mostrarError('Tu email no está registrado en el sistema.');
        document.getElementById('btnGoogle').disabled = false;
        document.getElementById('btnGoogle').innerHTML = '<i class="bi bi-google me-1"></i> Entrar con Google';
      }
    })
    .catch(err => {
      mostrarError('Error: ' + err.message);
      document.getElementById('btnGoogle').disabled = false;
      document.getElementById('btnGoogle').innerHTML = '<i class="bi bi-google me-1"></i> Entrar con Google';
    });
}

function iniciarSesion(res) {
  document.getElementById('loaderBase').classList.add('d-none');
  document.getElementById('loginScreen').classList.add('d-none');
  document.getElementById('appContainer').classList.remove('d-none');

  state.email     = res.emailActual;
  state.nombre    = res.user;
  state.rol       = res.rol;
  state.esManager = res.rol.toLowerCase().includes("manager");

  document.getElementById('userName').textContent = `${res.user} · ${res.rol}`;

  if (state.esManager) {
    document.getElementById('nav-dashboard').style.display = 'flex';
    document.getElementById('tituloTareas').innerHTML = '<i class="bi bi-list-task"></i> Tareas Activas — Agencia';
  }

  renderizarTareas(res.tareas);
}

function cerrarSesion() {
  auth.signOut().then(() => {
    document.getElementById('appContainer').classList.add('d-none');
    document.getElementById('loginScreen').classList.remove('d-none');
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('btnGoogle').disabled = false;
    document.getElementById('btnGoogle').innerHTML = '<i class="bi bi-google me-1"></i> Entrar con Google';
  });
}

// ═══════════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════════
function callAPI(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.append('action', action);
  Object.keys(params).forEach(key => {
    url.searchParams.append(key, params[key]);
  });
  
  return fetch(url.toString(), { method: 'GET' })
    .then(response => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    });
}

// ═══════════════════════════════════════════════════
// VISTAS
// ═══════════════════════════════════════════════════
function cambiarVista(vista) {
  ['activas','marketplace','historico','dashboard'].forEach(v => {
    const el = document.getElementById('vista' + v.charAt(0).toUpperCase() + v.slice(1));
    if (el) el.classList.add('d-none');
    const btn = document.getElementById('nav-' + v);
    if (btn) btn.classList.remove('active');
  });
  const btn = document.getElementById('nav-' + vista);
  if (btn) btn.classList.add('active');

  if (vista === 'activas') {
    document.getElementById('vistaActivas').classList.remove('d-none');
    cargarTareas();
  }
}

function cargarTareas() {
  callAPI('cargarSesion', { email: state.email })
    .then(res => renderizarTareas(res.tareas))
    .catch(err => toast('Error: ' + err.message, 'error'));
}

function renderizarTareas(tareas) {
  state.tareasRaw = tareas || [];
  poblarFiltros(state.tareasRaw);
  aplicarFiltros();
}

function poblarFiltros(tareas) {
  const fP = document.getElementById('filtroProyecto');
  const valP = fP.value;
  const proyectos = [...new Set(tareas.map(t => t.proyecto).filter(Boolean))].sort();
  fP.innerHTML = '<option value="">Todos los proyectos</option>';
  proyectos.forEach(p => fP.innerHTML += `<option value="${p}" ${p===valP?'selected':''}>${p}</option>`);
}

function aplicarFiltros() {
  const fP = document.getElementById('filtroProyecto').value.toLowerCase();
  const fS = document.getElementById('filtroStatus').value.toLowerCase();
  const filtradas = state.tareasRaw.filter(t => {
    const matchP = !fP || (t.proyecto && t.proyecto.toLowerCase() === fP);
    const matchS = !fS || (t.status && t.status.toLowerCase().includes(fS.replace('en revisión','revisión')));
    return matchP && matchS;
  });
  pintarTarjetas(filtradas);
}

function limpiarFiltros() {
  document.getElementById('filtroProyecto').value = '';
  document.getElementById('filtroStatus').value = '';
  aplicarFiltros();
}

function pintarTarjetas(tareas) {
  const cont = document.getElementById('listaTareas');
  if (tareas.length === 0) {
    cont.innerHTML = `<div class="col-12"><div class="empty-state"><i class="bi bi-inbox"></i><p>No hay tareas.</p></div></div>`;
    return;
  }

  cont.innerHTML = tareas.map(t => `
    <div class="col-md-6 col-lg-4">
      <div class="task-card">
        <div class="task-card-head">
          <div class="d-flex justify-content-between align-items-start mb-1">
            <span class="text-muted" style="font-size:0.72rem;font-weight:700;">${t.id}</span>
            <span class="prio-badge prio-important">${t.prioridad || 'Normal'}</span>
          </div>
          <p class="mb-1 fw-bold" style="font-size:0.9rem;color:var(--text);line-height:1.3;">${t.tarea}</p>
          <div style="font-size:0.75rem;color:var(--muted);"><i class="bi bi-folder2"></i> ${t.proyecto}</div>
          <span class="status-badge s-todo ms-2">${t.status}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function mostrarError(msg) {
  const errDiv = document.getElementById('loginError');
  errDiv.innerText = msg;
  errDiv.classList.add('show');
}

function toast(msg, tipo = 'success') {
  const el = document.getElementById('gdaToast');
  el.textContent = msg;
  el.className = `gda-toast ${tipo} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.onload = () => {
  document.getElementById('loaderBase').classList.add('d-none');
};
</script>
</body>
</html>
